name: StatIppica — Nightly Maintenance (aggiorna e colma buchi cavalli esistenti)
on:
  # Ogni notte alle 01:30 UTC — un'ora dopo il job "Results", per non litigare sul push
  schedule:
    - cron: "30 1 * * *"
  workflow_dispatch:
    inputs:
      reason:
        description: "Motivo del trigger manuale"
        required: false
        default: "trigger manuale"
jobs:
  nightly-maintenance:
    name: Esegui nightly_update.py (mode=maintenance)
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Installa dipendenze
        run: pip install requests beautifulsoup4
      - name: Esegui nightly_update.py (maintenance)
        env:
          NIGHTLY_MODE: maintenance
          DB_PATH: data.db
          REPO_DB_PATH: data.db
          GITHUB_TOKEN: ${{ secrets.GH_NIGHTLY_TOKEN }}
          GITHUB_USER: matteopetracca6-bit
          GITHUB_REPO: statippica
          ACTIVE_UPDATE_BATCH_SIZE: "3000"
          BACKFILL_BATCH_SIZE: "250"
        run: python nightly_update.py
      - name: Trigger deploy Render dopo aggiornamento DB
        if: success()
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{}' \
            "https://api.render.com/v1/services/srv-d92cpfm7r5hc73fe07ig/deploys" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print('Deploy:', d.get('id','?'), d.get('status','?'))"
