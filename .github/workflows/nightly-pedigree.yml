name: StatIppica — Pedigree (test)
on:
  workflow_dispatch:
    inputs:
      limit:
        description: "Quanti record processare per fase (test piccolo consigliato: 10)"
        required: false
        default: "10"
      no_push:
        description: "Non salvare su GitHub (solo test, true/false)"
        required: false
        default: "true"
jobs:
  fill-pedigree:
    name: Esegui fill_pedigree.py
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Installa dipendenze
        run: pip install requests beautifulsoup4
      - name: Esegui fill_pedigree.py
        env:
          DB_PATH: data.db
          REPO_DB_PATH: data.db
          GITHUB_TOKEN: ${{ secrets.GH_NIGHTLY_TOKEN }}
          GITHUB_USER: matteopetracca6-bit
          GITHUB_REPO: statippica
        run: |
          ARGS="--limit ${{ inputs.limit }}"
          if [ "${{ inputs.no_push }}" = "true" ]; then
            ARGS="$ARGS --no-push"
          fi
          echo "Eseguo: python fill_pedigree.py $ARGS"
          python fill_pedigree.py $ARGS
      - name: Trigger deploy Render (solo se ha salvato davvero)
        if: success() && inputs.no_push != 'true'
        run: |
          sleep 15
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{}' \
            "https://api.render.com/v1/services/srv-d92cpfm7r5hc73fe07ig/deploys" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print('Deploy:', d.get('id','?'), d.get('status','?'))"
