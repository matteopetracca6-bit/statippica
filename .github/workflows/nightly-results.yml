name: StatIppica — Nightly Results (gare mancanti + cavalli nuovi)
on:
  # Ogni notte alle 00:30 UTC
  schedule:
    - cron: "30 0 * * *"
  workflow_dispatch:
    inputs:
      reason:
        description: "Motivo del trigger manuale"
        required: false
        default: "trigger manuale"
jobs:
  nightly-results:
    name: Esegui nightly_update.py (mode=results)
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Installa dipendenze
        run: pip install requests beautifulsoup4
      - name: Esegui nightly_update.py (results)
        env:
          NIGHTLY_MODE: results
          DB_PATH: data.db
          REPO_DB_PATH: data.db
          GITHUB_TOKEN: ${{ secrets.GH_NIGHTLY_TOKEN }}
          GITHUB_USER: matteopetracca6-bit
          GITHUB_REPO: statippica
        run: python nightly_update.py
      - name: Trigger deploy Render dopo aggiornamento DB
        if: success()
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{}' \
            "https://api.render.com/v1/services/srv-d92cpfm7r5hc73fe07ig/deploys" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print('Deploy:', d.get('id','?'), d.get('status','?'))"
