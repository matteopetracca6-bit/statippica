name: StatIppica — Weekly Breeding Model (retraining)
on:
  # Ogni domenica alle 04:30 UTC — dopo che i job notturni hanno aggiornato i dati.
  # Settimanale, non giornaliero: il modello cambia poco giorno per giorno,
  # ritrainarlo ogni notte sarebbe spreco.
  schedule:
    - cron: "30 4 * * 0"
  workflow_dispatch: {}
jobs:
  train:
    name: Addestra breeding_model.json
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Installa dipendenze
        run: pip install scikit-learn numpy
      - name: Addestra il modello
        env:
          DB_PATH: data.db
        run: python train_breeding_model.py
      - name: Commit e push del modello
        run: |
          git config user.email "nightly@statippica.bot"
          git config user.name "StatIppica Breeding Trainer"
          git remote set-url origin "https://matteopetracca6-bit:${{ secrets.GH_NIGHTLY_TOKEN }}@github.com/matteopetracca6-bit/statippica.git"
          git add breeding_model.json
          git commit -m "breeding model retrain $(date -u '+%Y-%m-%d')" || echo "nessuna modifica"
          git push origin main || echo "push saltato"
      - name: Trigger deploy Render
        if: success()
        run: |
          sleep 15
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{}' \
            "https://api.render.com/v1/services/srv-d92cpfm7r5hc73fe07ig/deploys" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print('Deploy:', d.get('id','?'), d.get('status','?'))"
